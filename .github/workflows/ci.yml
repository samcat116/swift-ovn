name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test-ubuntu:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  test-macos:
    name: Test on macOS
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Swift 6
        run: |
          sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test
